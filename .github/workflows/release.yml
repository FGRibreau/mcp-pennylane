name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          changelog: CHANGELOG.md

  upload-binaries:
    name: Upload binary (${{ matrix.target }})
    needs: [create-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Upload mcp-pennylane binary to GitHub Release
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: mcp-pennylane
          target: ${{ matrix.target }}
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

  # Publish-side jobs gated behind the `release` GitHub Actions environment.
  # The environment carries the privileged secrets (CARGO_REGISTRY_TOKEN,
  # HOMEBREW_TAP_GITHUB_TOKEN) and a tag-only deployment branch policy (v*)
  # so a push to a feature branch can never reach these credentials.
  # Add reviewers in repo Settings → Environments → release for manual approval.

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [upload-binaries]
    environment:
      name: release
      url: https://crates.io/crates/mcp-pennylane
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      - name: Verify CARGO_REGISTRY_TOKEN secret is set
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is not configured in the 'release' environment."
            echo "::error::Add it in Settings → Environments → release → Add secret."
            echo "::error::Failing fast rather than silently skipping (per repo policy)."
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish mcp-pennylane to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p mcp-pennylane

  update-homebrew-tap:
    name: Bump Homebrew tap formula
    runs-on: ubuntu-latest
    needs: [upload-binaries, publish-crates]
    environment:
      name: release
      url: https://github.com/FGRibreau/homebrew-tap
    steps:
      - name: Verify HOMEBREW_TAP_GITHUB_TOKEN secret is set
        run: |
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_GITHUB_TOKEN secret is not configured in the 'release' environment."
            echo "::error::Add it in Settings → Environments → release → Add secret."
            echo "::error::Failing fast rather than silently skipping (per repo policy)."
            exit 1
          fi
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Bump fgribreau/homebrew-tap formula
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          tap: fgribreau/homebrew-tap
          formula: mcp-pennylane
          tag: ${{ github.ref_name }}
