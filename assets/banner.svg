<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <!-- ==================== GRADIENTS ==================== -->
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="pennylaneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- ==================== FLOW GRADIENTS ==================== -->
    <!-- Request: Claude → server (purple, left to right) -->
    <linearGradient id="flowReqL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="45%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="55%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.15"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="2.4s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Response: server → Claude (indigo, right to left) -->
    <linearGradient id="flowRespL" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="45%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="1"/>
      <stop offset="55%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="1 0" to="-1 0" dur="2.4s" repeatCount="indefinite" begin="1.2s"/>
    </linearGradient>

    <!-- Request: server → Pennylane (indigo, left to right) -->
    <linearGradient id="flowReqR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="45%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="1"/>
      <stop offset="55%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.15"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="2.4s" repeatCount="indefinite" begin="0.6s"/>
    </linearGradient>

    <!-- Response: Pennylane → server (green, right to left) -->
    <linearGradient id="flowRespR" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="45%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="1"/>
      <stop offset="55%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.15"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="1 0" to="-1 0" dur="2.4s" repeatCount="indefinite" begin="1.8s"/>
    </linearGradient>

    <!-- ==================== SHADOW ==================== -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#64748b" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="700" height="280" fill="#f8fafc"/>

  <!-- ==================== TITLE STRIP ==================== -->
  <text x="350" y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b" letter-spacing="2">MCP · PENNYLANE COMPANY API v2</text>

  <!-- ==================== CARD 1: CLAUDE / LLM CLIENT ==================== -->
  <g transform="translate(40, 50)" filter="url(#cardShadow)">
    <rect width="160" height="180" rx="14" fill="white"/>
    <rect width="160" height="42" rx="14" fill="url(#claudeGrad)"/>
    <rect y="30" width="160" height="12" fill="url(#claudeGrad)"/>

    <!-- Sparkle icon (white) -->
    <g transform="translate(72, 10)">
      <path d="M 8 0 L 9.5 6.5 L 16 8 L 9.5 9.5 L 8 16 L 6.5 9.5 L 0 8 L 6.5 6.5 Z" fill="white" opacity="0.95"/>
    </g>

    <text x="80" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Claude</text>
    <text x="80" y="78" text-anchor="middle" font-size="10" fill="#64748b">MCP host</text>

    <!-- Pills: stdio + HTTP -->
    <g transform="translate(20, 96)">
      <rect width="50" height="18" rx="9" fill="#a855f7" fill-opacity="0.12"/>
      <text x="25" y="13" text-anchor="middle" font-size="9" font-weight="600" fill="#7c3aed">stdio</text>
    </g>
    <g transform="translate(82, 96)">
      <rect width="58" height="18" rx="9" fill="#a855f7" fill-opacity="0.12"/>
      <text x="29" y="13" text-anchor="middle" font-size="9" font-weight="600" fill="#7c3aed">HTTP</text>
    </g>

    <!-- Footer info box -->
    <g transform="translate(15, 130)">
      <rect width="130" height="36" rx="8" fill="#a855f7" fill-opacity="0.08"/>
      <text x="65" y="15" text-anchor="middle" font-size="9" font-weight="600" fill="#7c3aed">tools/list · tools/call</text>
      <text x="65" y="28" text-anchor="middle" font-size="8" fill="#7c3aed" opacity="0.85">JSON-RPC 2.0</text>
    </g>
  </g>

  <!-- ==================== ARROWS: CLAUDE ↔ SERVER ==================== -->
  <!-- Request top -->
  <g>
    <path d="M 205 110 L 255 110" stroke="#e2e8f0" stroke-width="2" fill="none"/>
    <path d="M 205 110 L 255 110" stroke="url(#flowReqL)" stroke-width="3" fill="none"/>
    <path d="M 250 105 L 260 110 L 250 115" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <!-- Particles -->
    <circle r="2.5" fill="#a855f7" opacity="0">
      <animateMotion dur="2.4s" repeatCount="indefinite" path="M 205 110 L 255 110"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Response bottom -->
  <g>
    <path d="M 205 170 L 255 170" stroke="#e2e8f0" stroke-width="2" fill="none"/>
    <path d="M 205 170 L 255 170" stroke="url(#flowRespL)" stroke-width="3" fill="none"/>
    <path d="M 210 165 L 200 170 L 210 175" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite" begin="1.2s"/>
    </path>
    <circle r="2.5" fill="#6366f1" opacity="0">
      <animateMotion dur="2.4s" repeatCount="indefinite" begin="1.2s" path="M 255 170 L 205 170"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.4s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
  </g>
  <text x="230" y="146" text-anchor="middle" font-size="8" fill="#94a3b8" letter-spacing="0.5">MCP</text>

  <!-- ==================== CARD 2: MCP-PENNYLANE (CENTRAL) ==================== -->
  <g transform="translate(260, 50)" filter="url(#cardShadow)">
    <rect width="180" height="180" rx="14" fill="white"/>
    <rect width="180" height="42" rx="14" fill="url(#brandGrad)"/>
    <rect y="30" width="180" height="12" fill="url(#brandGrad)"/>

    <!-- Server / brackets icon -->
    <g transform="translate(82, 10)">
      <path d="M 5 4 L 1 12 L 5 20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 11 4 L 15 12 L 11 20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="90" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">mcp-pennylane</text>
    <text x="90" y="78" text-anchor="middle" font-size="10" fill="#64748b">Rust · rmcp · 75 tools</text>

    <!-- Pills: 73 essentials + search/execute -->
    <g transform="translate(14, 96)">
      <rect width="74" height="18" rx="9" fill="#6366f1" fill-opacity="0.12"/>
      <text x="37" y="13" text-anchor="middle" font-size="9" font-weight="600" fill="#4f46e5">73 essentials</text>
    </g>
    <g transform="translate(94, 96)">
      <rect width="72" height="18" rx="9" fill="#6366f1" fill-opacity="0.12"/>
      <text x="36" y="13" text-anchor="middle" font-size="9" font-weight="600" fill="#4f46e5">+ 2 meta-tools</text>
    </g>

    <!-- Readonly auto-detect highlight -->
    <g transform="translate(14, 124)">
      <rect width="152" height="20" rx="8" fill="#f59e0b" fill-opacity="0.12"/>
      <text x="76" y="14" text-anchor="middle" font-size="9" font-weight="600" fill="#d97706">readonly auto-detect via /me</text>
    </g>

    <!-- Footer -->
    <g transform="translate(14, 152)">
      <rect width="152" height="18" rx="8" fill="#10b981" fill-opacity="0.10"/>
      <text x="76" y="13" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">Bearer · stdio + streamable HTTP</text>
    </g>
  </g>

  <!-- ==================== ARROWS: SERVER ↔ PENNYLANE ==================== -->
  <!-- Request top (server → API) -->
  <g>
    <path d="M 445 110 L 495 110" stroke="#e2e8f0" stroke-width="2" fill="none"/>
    <path d="M 445 110 L 495 110" stroke="url(#flowReqR)" stroke-width="3" fill="none"/>
    <path d="M 490 105 L 500 110 L 490 115" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite" begin="0.6s"/>
    </path>
    <circle r="2.5" fill="#6366f1" opacity="0">
      <animateMotion dur="2.4s" repeatCount="indefinite" begin="0.6s" path="M 445 110 L 495 110"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.4s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>
  <!-- Response bottom (API → server) -->
  <g>
    <path d="M 445 170 L 495 170" stroke="#e2e8f0" stroke-width="2" fill="none"/>
    <path d="M 445 170 L 495 170" stroke="url(#flowRespR)" stroke-width="3" fill="none"/>
    <path d="M 450 165 L 440 170 L 450 175" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite" begin="1.8s"/>
    </path>
    <circle r="2.5" fill="#10b981" opacity="0">
      <animateMotion dur="2.4s" repeatCount="indefinite" begin="1.8s" path="M 495 170 L 445 170"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.4s" repeatCount="indefinite" begin="1.8s"/>
    </circle>
  </g>
  <text x="470" y="146" text-anchor="middle" font-size="8" fill="#94a3b8" letter-spacing="0.5">REST</text>

  <!-- ==================== CARD 3: PENNYLANE API ==================== -->
  <g transform="translate(500, 50)" filter="url(#cardShadow)">
    <rect width="160" height="180" rx="14" fill="white"/>
    <rect width="160" height="42" rx="14" fill="url(#pennylaneGrad)"/>
    <rect y="30" width="160" height="12" fill="url(#pennylaneGrad)"/>

    <!-- Cloud / API icon -->
    <g transform="translate(72, 12)">
      <path d="M 4 12 a 4 4 0 0 1 4 -4 a 4 4 0 0 1 7 1 a 3 3 0 0 1 1 6 H 5 a 3 3 0 0 1 -1 -3 z" fill="white" opacity="0.95"/>
    </g>

    <text x="80" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Pennylane</text>
    <text x="80" y="78" text-anchor="middle" font-size="10" fill="#64748b">Company API v2</text>

    <!-- Pills: 163 ops + cursor pagination -->
    <g transform="translate(20, 96)">
      <rect width="54" height="18" rx="9" fill="#10b981" fill-opacity="0.12"/>
      <text x="27" y="13" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">163 ops</text>
    </g>
    <g transform="translate(82, 96)">
      <rect width="58" height="18" rx="9" fill="#10b981" fill-opacity="0.12"/>
      <text x="29" y="13" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">cursor</text>
    </g>

    <!-- Footer info box -->
    <g transform="translate(15, 130)">
      <rect width="130" height="36" rx="8" fill="#10b981" fill-opacity="0.08"/>
      <text x="65" y="15" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">customers · invoices</text>
      <text x="65" y="28" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">ledger · FEC · banking</text>
    </g>
  </g>

  <!-- ==================== FOOTER LABEL ==================== -->
  <text x="350" y="262" text-anchor="middle" font-size="9" fill="#94a3b8" letter-spacing="1">stdio for Claude Desktop · streamable HTTP for remote · readonly defense-in-depth</text>
</svg>
